name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify generated output is not committed
        run: |
          banned="$(git ls-files 'generated/**')"
          if [ -n "$banned" ]; then
            echo "Committed generated artifacts are not allowed:"
            echo "$banned"
            exit 1
          fi

      - name: Run tests
        run: pytest -q

      - name: Run sample pipeline integration test explicitly
        run: pytest -q tests/test_sample_integration.py
